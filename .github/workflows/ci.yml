name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # The pedantic / nursery groups are configured at warn level in
      # Cargo.toml as aspirational style guidance and currently produce
      # ~900 warnings on the image-processing modules — most are noise.
      # We silence the noisiest pedantic lints below and run clippy
      # strictly so any *new* actionable finding fails CI.
      - name: cargo clippy (deny warnings)
        run: >
          cargo clippy --no-deps --
          -D warnings
          -A clippy::pedantic
          -A clippy::nursery
          -A clippy::cast-precision-loss
          -A clippy::cast-possible-truncation
          -A clippy::cast-sign-loss
          -A clippy::cast-possible-wrap
          -A clippy::cast-lossless
          -A clippy::similar-names
          -A clippy::uninlined-format-args
          -A clippy::redundant-closure-for-method-calls
          -A clippy::doc-markdown
          -A clippy::unused-self
          -A clippy::missing-errors-doc
          -A clippy::missing-panics-doc
          -A clippy::module-name-repetitions
          -A clippy::too-many-lines
          -A clippy::suboptimal-flops
          -A clippy::imprecise-flops
          -A clippy::unnecessary-wraps
          -A clippy::unreadable-literal
          -A clippy::redundant-clone
          -A clippy::needless-pass-by-value
          -A clippy::option-if-let-else
          -A clippy::match-same-arms
          -A clippy::manual-let-else
          -A clippy::use-self
          -A clippy::if-not-else
          -A clippy::range-plus-one
          -A clippy::cognitive-complexity
          -A clippy::single-match-else
          -A clippy::needless-raw-string-hashes
          -A clippy::large-stack-arrays
          -A clippy::missing-const-for-fn
          -A clippy::or-fun-call

      - name: cargo test
        run: cargo test --all-targets

      # ts-rs writes generated TS files into ../src/lib/types/generated/
      # at test time. Fail CI if anyone forgot to commit the regenerated
      # output after changing a #[derive(TS)] struct.
      - name: Verify generated TS bindings are committed
        shell: bash
        working-directory: .
        run: |
          if [[ -n "$(git status --porcelain src/lib/types/generated/)" ]]; then
            echo "::error::Generated TS bindings are out of date. Run 'cargo test' in src-tauri/ and commit the result."
            git status src/lib/types/generated/
            git diff src/lib/types/generated/
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm test
